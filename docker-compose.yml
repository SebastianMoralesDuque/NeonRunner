services:
  neonrunner:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_HOST=10.0.4.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
      - app_net
    restart: unless-stopped

networks:
  coolify:
    external: true
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.5.0/24
