services:
  neonrunner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OLLAMA_HOST=http://10.0.2.1:11434
      - OLLAMA_MODEL=granite4.1:3b
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.neonrunner.rule=Host(`neonrunner.sebastianmorales.sbs`)"
      - "traefik.http.routers.neonrunner.entryPoints=http,https"
      - "traefik.http.routers.neonrunner.tls=true"
      - "traefik.http.routers.neonrunner.service=neonrunner"
      - "traefik.http.services.neonrunner.loadbalancer.server.port=3000"
    restart: unless-stopped

networks:
  coolify:
    external: true
